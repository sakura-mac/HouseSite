name = "swallow-homes-api"
main = "index.js"
compatibility_date = "2024-09-01"

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "swallow-homes-db"
database_id = "45f16531-09e4-4e57-8812-665f19735339"

# R2 存储桶（图片）
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "swallow-homes-images"

# 环境变量
[vars]
CORS_ORIGIN = "https://swallow-homes-admin.pages.dev,https://19b91558.swallow-homes-admin.pages.dev,http://localhost:3000,http://localhost:3001"
ADMIN_EMAILS = "your-email@example.com"  # Cloudflare Access 的备选方案
